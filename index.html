<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>BeyTracker X</title>

<meta name="theme-color" content="#090a0e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="application-name" content="BeyTracker X"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BeyTracker X"/>

<link rel="manifest" href="./manifest.json">
<link rel="stylesheet" href="./theme.css">
<link rel="stylesheet" href="./layout.css">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="./data.js"></script>
<script src="./icons.js"></script>

<script>
// Gestione immediata del tema
(function(){
  const saved = localStorage.getItem('beytrackerx_theme');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const theme = saved || (prefersDark ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>

<style id="theme-css">
</style>

<style id="layout-css">
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useReducer, useEffect, useRef } = React;

/* --- LOGICA DI SUPPORTO --- */
const comboLabel = c => {
  if (!c) return "—";
  if (c.system === "CX")
    return (c.lockChip && c.mainBlade && c.assistBlade && c.ratchet && c.bit)
      ? `${c.lockChip} ${c.mainBlade} / ${c.assistBlade} ${c.ratchet} ${c.bit}` : "CX incompleta";
  return (c.blade && c.ratchet && c.bit) ? `${c.blade} ${c.ratchet} ${c.bit}` : "—";
};
const isComplete = c => {
  if (!c) return false;
  if (c.system === "CX") return !!(c.lockChip && c.mainBlade && c.assistBlade && c.ratchet && c.bit);
  return !!(c.blade && c.ratchet && c.bit);
};
const blankCombo = () => ({ system:"BX", blade:"", lockChip:"", mainBlade:"", assistBlade:"", ratchet:"", bit:"" });
const makeOpp = (id) => ({ id, wins:0, losses:0, draws:0, history:[], ...blankCombo() });

const STORAGE_KEY = "beytrackerx_v2";

/* --- REDUCER --- */
function reducer(s, a) {
  let next;
  switch (a.type) {
    case "MY":     next = { ...s, myCombo: { ...s.myCombo, [a.f]: a.v } }; break;
    case "OPP":    next = { ...s, opponents: s.opponents.map(o => o.id===a.id ? { ...o, [a.f]:a.v } : o) }; break;
    case "ADD":    next = { ...s, opponents: [...s.opponents, makeOpp(s.nextId)], nextId: s.nextId+1 }; break;
    case "DEL":    next = { ...s, opponents: s.opponents.filter(o => o.id !== a.id) }; break;
    case "LOG":    next = { ...s, opponents: s.opponents.map(o => o.id === a.oppId ? { ...o, [a.r === 'win' ? 'wins' : a.r === 'loss' ? 'losses' : 'draws']: o[a.r === 'win' ? 'wins' : a.r === 'loss' ? 'losses' : 'draws'] + 1, history: [{id:Date.now(), result:a.r, finish:a.finish, ts:new Date().toLocaleTimeString()}, ...o.history] } : o) }; break;
    case "VIEW":   next = { ...s, view: a.v }; break;
    case "RESTORE": next = a.data; break;
    case "FACTORY_RESET": next = { myCombo: blankCombo(), opponents: [makeOpp(1)], nextId: 2, view: "tracker", decks: [], nextDeckId: 1 }; break;
    default: return s;
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
  return next;
}

/* --- COMPONENTI UI --- */
function Sel({ val, onChange, opts, ph, accent }) {
  return (
    <select value={val} onChange={e => onChange(e.target.value)} style={{ background:"var(--bg-select)", color:"var(--text-primary)", border:`1px solid ${accent || 'var(--border-select)'}`, borderRadius:6, padding:6, flex:1, fontSize:12 }}>
      <option value="">{ph}</option>
      {opts.map(o => <option key={o} value={o}>{o}</option>)}
    </select>
  );
}

function ComboForm({ combo, onChange }) {
  const ac = SYS_COL[combo.system];
  // Qui usiamo le costanti BX_BLADES, UX_BLADES, etc. che vengono da data.js
  const blades = combo.system === "UX" ? UX_BLADES : combo.system === "CX" ? CX_BLADES : BX_BLADES;
  return (
    <div className="combo-form">
      <div className="sys-toggle">
        {["BX","UX","CX"].map(sys => (
          <button key={sys} onClick={() => onChange("system", sys)} className="sys-btn" 
            style={{ background: combo.system === sys ? SYS_COL[sys] : 'transparent', color: combo.system === sys ? '#fff' : 'var(--text-dimmer)', borderColor: SYS_COL[sys] }}>
            {sys}
          </button>
        ))}
      </div>
      <div className="row2">
        <Sel val={combo.blade} onChange={v => onChange("blade", v)} opts={blades} ph="Blade" accent={ac} />
        <Sel val={combo.ratchet} onChange={v => onChange("ratchet", v)} opts={RATCHETS} ph="Ratchet" accent={ac} />
      </div>
      <Sel val={combo.bit} onChange={v => onChange("bit", v)} opts={BIT_NAMES} ph="Bit" accent={ac} />
    </div>
  );
}

/* --- APP PRINCIPALE --- */
function App() {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
  const [s, d] = useReducer(reducer, saved || { myCombo: blankCombo(), opponents: [makeOpp(1)], nextId: 2, view: "tracker", decks: [], nextDeckId: 1 });
  const [theme, setTheme] = useState(() => localStorage.getItem('beytrackerx_theme') || 'dark');
  const [log, setLog] = useState(null);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('beytrackerx_theme', theme);
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = theme === 'light' ? '#f0f2f7' : '#090a0e';
  }, [theme]);

  const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

  return (
    <div className="app">
      <header className="header">
        <div className="flex-center">
          <div className="logo-spin">⚡</div>
          <div className="logo-text">BEY<span style={{color:"#00b4ff"}}>TRACKER</span> X</div>
        </div>
        <nav className="nav">
          {BNAV_TABS.map(t => (
            <button key={t.v} onClick={() => d({type:"VIEW", v:t.v})} className={`nav-btn ${s.view === t.v ? 'active' : 'inactive'}`}>{t.label}</button>
          ))}
        </nav>
        <button onClick={toggleTheme} className="theme-toggle-btn">
          {theme === 'dark' ? '☀️' : '🌙'}
        </button>
      </header>

      <div className="desktop-shell">
        <aside className="sidebar">
          {BNAV_TABS.map(t => (
            <button key={t.v} onClick={() => d({type:"VIEW", v:t.v})} className={`sidebar-btn ${s.view === t.v ? 'active' : ''}`}>
              {t.icon} {t.label}
            </button>
          ))}
          <button onClick={toggleTheme} className="sidebar-btn" style={{marginTop:'auto'}}>
            {theme === 'dark' ? '☀️ Tema Chiaro' : '🌙 Tema Scuro'}
          </button>
        </aside>

        <main className="desktop-main">
          <div className="content">
            {s.view === "tracker" && (
              <>
                <div className="my-combo-card">
                  <div className="card-header"><div className="card-accent-bar" /><span className="card-title">La Tua Combo</span></div>
                  <ComboForm combo={s.myCombo} onChange={(f, v) => d({type:"MY", f, v})} />
                </div>
                <div className="section-header">
                  <span className="section-title">Avversari</span>
                  <button className="add-btn" onClick={() => d({type:"ADD"})}>+ Aggiungi</button>
                </div>
                {s.opponents.map(opp => (
                  <div key={opp.id} className="opp-card">
                    <div className="opp-body">
                      <div className="opp-top">
                        <span className="opp-label-name">{comboLabel(opp)}</span>
                        <button className="del-btn" onClick={() => d({type:"DEL", id:opp.id})}>×</button>
                      </div>
                      <ComboForm combo={opp} onChange={(f, v) => d({type:"OPP", id:opp.id, f, v})} />
                      <div className="opp-actions">
                        <button className={`register-btn ${isComplete(s.myCombo) && isComplete(opp) ? 'enabled' : 'disabled'}`} onClick={() => setLog(opp.id)}>⚔ Log</button>
                      </div>
                    </div>
                  </div>
                ))}
              </>
            )}
            {/* ... Altre viste (Stats, Backup) ... */}
          </div>
        </main>
      </div>

      <nav className="bottom-nav">
        {BNAV_TABS.map(t => (
          <button key={t.v} onClick={() => d({type:"VIEW", v:t.v})} className={`bottom-nav-btn ${s.view === t.v ? 'active' : ''}`}>
            {t.icon} <span>{t.label}</span>
          </button>
        ))}
        <button onClick={toggleTheme} className="bottom-nav-btn">
          {theme === 'dark' ? '☀️' : '🌙'} <span>Tema</span>
        </button>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(console.error);
  });
}
</script>
</body>
</html>
